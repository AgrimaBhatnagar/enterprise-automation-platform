name: Deploy Infra

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Init
        run: terraform init
        working-directory: gcp-deploy/infra

      - name: Apply
        run: terraform apply -auto-approve
        working-directory: gcp-deploy/infra
